<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一杯气泡水</title>
  <style>
    :root {
      --bg: #f9f6f0;
      --paper: rgba(255, 252, 247, 0.84);
      --paper-strong: rgba(255, 252, 247, 0.96);
      --line: rgba(86, 82, 78, 0.18);
      --text: #2d2926;
      --muted: #6f6963;
      --shadow: 0 30px 90px rgba(80, 67, 58, 0.1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.9), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(219, 228, 233, 0.4), transparent 24%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      letter-spacing: 0.02em;
    }

    button, input { font: inherit; }

    .page {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 0;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
    }

    .profile-section {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 40px;
      align-items: center;
      width: 100%;
      max-width: 1000px;
    }

    .profile-photo {
      width: 300px;
      height: 400px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .questions-section {
      padding: 80px 0;
    }

    .section-title {
      text-align: center;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 500;
      margin-bottom: 40px;
      color: var(--text);
    }

    .card, .scene, .quote-bar {
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card {
      position: sticky;
      top: 20px;
      padding: 22px 20px 18px;
      border-radius: 24px;
      min-height: 220px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(86, 82, 78, 0.12);
    }

    .card-title { margin: 0; font-size: 1rem; font-weight: 600; }

    .card-note {
      font-size: 0.76rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .profile-list { display: grid; gap: 12px; }

    .profile-item {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 0.96rem;
      line-height: 1.75;
    }

    .profile-key { color: var(--muted); }
    .profile-value { color: var(--text); }

    .scene {
      position: relative;
      border-radius: 28px;
      padding: 18px 18px 56px;
      overflow: hidden;
      min-height: 760px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(247, 242, 235, 0.92)),
        var(--paper);
    }

    .cup-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) 280px;
      gap: 18px;
      align-items: stretch;
    }

    .cup-stage {
      position: relative;
      min-height: 620px;
      border-radius: 24px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(247, 244, 238, 0.12));
    }

    .cup-shell {
      position: relative;
      width: min(100%, 560px);
      height: 100%;
      min-height: 580px;
      margin: 0 auto;
    }

    #bubbleCanvas, .label-layer, .status-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #bubbleCanvas {
      pointer-events: auto;
      cursor: default;
    }

    .label-layer, .status-layer { pointer-events: none; }

    .cluster-label {
      position: absolute;
      transform: translate(-50%, -100%);
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #4c4946;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(88, 78, 69, 0.08);
      white-space: nowrap;
    }

    .empty-note {
      position: absolute;
      left: 50%;
      bottom: 12%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(86, 82, 78, 0.1);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .empty-note.show { opacity: 1; }

    .answer-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 580px;
    }

    .answer-box, .meta-box {
      border-radius: 20px;
      border: 1px solid rgba(86, 82, 78, 0.12);
      background: var(--paper-strong);
      padding: 16px 16px 18px;
    }

    .panel-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .question-title {
      margin: 0 0 10px;
      font-size: 1rem;
      line-height: 1.7;
      font-weight: 600;
    }

    .answer-text {
      margin: 0;
      min-height: 180px;
      color: var(--text);
      line-height: 2;
      font-size: 0.95rem;
    }

    .answer-text.is-placeholder { color: var(--muted); }

    .group-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .group-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.75rem;
      color: #45413d;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(86, 82, 78, 0.08);
    }

    .scene-foot {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .foot-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tiny-btn {
      border: 1px solid rgba(86, 82, 78, 0.16);
      background: rgba(255, 255, 255, 0.6);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    .tiny-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.88);
    }

    .foot-state { color: var(--muted); font-size: 0.8rem; }

    .quote-bar {
      margin-top: 16px;
      border-radius: 20px;
      padding: 14px 18px;
      text-align: center;
      color: #47423d;
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.9;
      min-height: 58px;
    }

    .quote-bar.is-placeholder { color: var(--muted); }

    @media (max-width: 960px) {
      .hero, .cup-layout { grid-template-columns: 1fr; }
      .card { position: relative; top: auto; }
      .scene { min-height: auto; }
      .cup-stage, .answer-panel { min-height: auto; }
      .cup-shell { min-height: 500px; }
      .scene-foot { position: static; margin-top: 16px; }
    }

    @media (max-width: 640px) {
      .page { width: min(100vw - 20px, 1180px); padding-top: 10px; }
      .scene, .card { border-radius: 22px; }
      .cup-shell { min-height: 430px; }
      .profile-item { grid-template-columns: 52px 1fr; }
    }
  </style>
</head>

};

    // 直接使用嵌入的数据
    function fetchExcelData() {
      console.log('Using embedded data, questions:', EMBEDDED_DATA.questions.length);
      hydrateState(EMBEDDED_DATA);
    }

    // 处理数据
    function hydrateState({ profileEntries, questions }) {
      console.log('=== Hydrating state ===');
      console.log('Profile entries:', profileEntries.length);
      console.log('Questions:', questions.length);
      
      state.profileEntries = profileEntries;
      state.profileMap = new Map(profileEntries.map((item) => [item.key, item.value]));
      state.questions = questions.sort((a, b) => {
        if (a.group !== b.group) return a.group.localeCompare(b.group, "zh-CN");
        return a.order - b.order;
      });
      
      console.log('Sorted questions:');
      state.questions.forEach(q => console.log(`  [${q.group}] ${q.question}`));
      
      state.answer = null;
      state.groups = buildGroups(state.questions);
      renderProfile();
      renderGroupChips();
      renderLabels();
      updateQuote();
      buildBubbles();
      updateAnswerPanel();
      updateFootState();
      state.ready = true;
      handleResize();
    }

    // 使用默认数据（备用）
    function useDefaultData() {
      const defaultProfileEntries = [
        { key: "姓名", value: "陈国苗" },
        { key: "年龄", value: "18岁" },

        { id: "5", group: "关于思考", question: "你如何看待人生？", answer: "人生是一场旅程，重要的是过程而不是结果，要珍惜每一个当下。", order: 1 },
        { id: "6", group: "关于思考", question: "你有什么人生信条？", answer: "先做，后看。行动比思考更重要，只有实践才能带来真正的成长。", order: 2 },
        { id: "7", group: "关于美与身体", question: "你如何定义美？", answer: "美是多元的，内在的自信和善良比外在的美丽更重要。", order: 1 },
        { id: "8", group: "关于美与身体", question: "你如何保持健康？", answer: "我喜欢运动，特别是越野跑和排球，这些运动让我保持身体和心理的健康。", order: 2 },
        { id: "9", group: "关于关系", question: "你如何看待人际关系？", answer: "人际关系是相互的，需要真诚和包容，要学会倾听和理解他人。", order: 1 },
        { id: "10", group: "关于关系", question: "你最重视什么关系？", answer: "我最重视家庭和朋友之间的关系，这些是我生活中最珍贵的财富。", order: 2 },
        { id: "11", group: "关于现在与未来", question: "你现在的目标是什么？", answer: "我现在的目标是好好学习日语，争取在专业上取得好成绩。", order: 1 },
        { id: "12", group: "关于现在与未来", question: "你对未来有什么规划？", answer: "未来我希望能够运用所学的知识，为社会做出贡献，同时也能实现自己的人生价值。", order: 2 }
      ];

      hydrateState({ questions: defaultQuestions, profileEntries: defaultProfileEntries });
    }

    // 构建分组
    function buildGroups(questions) {
      const uniqueGroups = Array.from(new Set(questions.map((item) => item.group)));
      return uniqueGroups.map((groupName, index) => {
        const anchor = clusterAnchors[index % clusterAnchors.length];
        const emoji = inferEmoji(groupName, index);
        return {
          name: groupName,
          label: `${emoji} ${groupName}`,
          color: palette[index % palette.length],
          positionX: anchor.x,
          positionY: anchor.y
        };
      });
    }

    // 推断 emoji
    function inferEmoji(groupName, index) {
      const matched = emojiRules.find((rule) => groupName.includes(rule.keyword));
      if (matched) return matched.emoji;
      const fallback = ["🫧", "🌫️", "🍃", "🪞", "🕊️", "🌙"];
      return fallback[index % fallback.length];
    }

    // 构建气泡 - 改进布局避免重叠
    function buildBubbles() {
      const grouped = new Map();
      state.groups.forEach((group) => grouped.set(group.name, []));
      state.questions.forEach((item) => grouped.get(item.group).push(item));
      state.bubbles = [];

      state.groups.forEach((group) => {
        const items = grouped.get(group.name) || [];
        const count = items.length;
        
        // 根据问题数量调整布局半径
        const baseRadius = 60 + count * 15;

        items.forEach((item, index) => {
          // 使用螺旋布局避免重叠
          const angle = (Math.PI * 2 * index) / Math.max(count, 1) + (index * 0.5);
          const layerRadius = baseRadius * (0.3 + 0.15 * Math.floor(index / 4));
          const bubbleRadius = clamp(28 + item.question.length * 0.15, 30, 50);

          state.bubbles.push({
            ...item,
            groupLabel: group.label,
            color: group.color,
            anchorX: group.positionX,
            anchorY: group.positionY,
            driftSeed: hashString(item.question + item.answer),
            baseOffsetX: Math.cos(angle) * layerRadius,
            baseOffsetY: Math.sin(angle) * layerRadius * 0.7,
            radius: bubbleRadius,
            popped: false,
            popStart: 0
          });
        });
      });
    }

    // 渲染个人信息
    function renderProfile() {
      profileList.innerHTML = "";
      state.profileEntries.forEach((entry) => {
        if (entry.key === "一句话" || entry.key === "照片") return;
        const row = document.createElement("div");
        row.className = "profile-item";
        row.innerHTML = `<div class="profile-key">${escapeHtml(entry.key)}</div><div class="profile-value">${escapeHtml(entry.value)}</div>`;
        profileList.appendChild(row);
      });
    }

    // 渲染分组标签
    function renderGroupChips() {
      groupChipList.innerHTML = "";
      state.groups.forEach((group) => {
        const chip = document.createElement("div");
        chip.className = "group-chip";
        chip.style.background = `${group.color}88`;
        chip.textContent = group.label;
        groupChipList.appendChild(chip);
      });
    }

    // 渲染分组位置标签
    function renderLabels() {
      labelLayer.innerHTML = "";
      state.groups.forEach((group) => {
        const label = document.createElement("div");
        label.className = "cluster-label";
        label.textContent = group.label;
        label.style.left = `${group.positionX}%`;
        label.style.top = `${Math.max(8, group.positionY - 12)}%`;
        label.style.background = hexToRgba(group.color, 0.24);
        labelLayer.appendChild(label);
      });
    }

    // 更新一句话
    function updateQuote() {
      const quote = state.profileMap.get("一句话") || "先做，后看。";
      quoteBar.textContent = `"${quote.replace(/^[""]|[""]$/g, "")}"`;
      quoteBar.classList.remove("is-placeholder");
    }

    // 更新答案面板
    function updateAnswerPanel() {
      if (!state.answer) {
        answerQuestion.textContent = "还没有被戳破的泡泡。";
        answerText.textContent = "点击一个气泡，答案会像一滴墨一样停在这里。";
        answerText.classList.add("is-placeholder");
        return;
      }
      answerQuestion.textContent = `${state.answer.groupLabel} · ${state.answer.question}`;
      answerText.textContent = state.answer.answer;
      answerText.classList.remove("is-placeholder");
    }

    // 更新底部状态
    function updateFootState() {
      if (!state.ready) {
        footState.textContent = "等待数据加载...";
        emptyNote.classList.remove("show");
        return;
      }

      const remaining = state.bubbles.filter((bubble) => !bubble.popped).length;
      const total = state.bubbles.length;
      footState.textContent = `还剩 ${remaining} / ${total} 个泡泡`;
      emptyNote.classList.toggle("show", remaining === 0 && total > 0);
    }

    // 处理窗口大小变化
    function handleResize() {
      if (!cupShell || !canvas || !ctx) return;
      const dpr = window.devicePixelRatio || 1;
      const rect = cupShell.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) {
        // 尺寸还没准备好，延迟重试
        setTimeout(handleResize, 50);
        return;
      }
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state.cupRect = rect;
    }

    // 获取当前 canvas 尺寸（直接获取，不依赖缓存）
    function getCanvasRect() {
      return canvas.getBoundingClientRect();
    }

    // 处理鼠标移动
    function handlePointerMove(event) {
      if (!state.ready) return;
      const rect = getCanvasRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const hovered = findBubbleAtPoint(x, y);
      state.hoverId = hovered ? hovered.id : null;
      canvas.style.cursor = hovered ? "pointer" : "default";
    }

    // 处理点击
    function handleCanvasClick(event) {
      if (!state.ready) return;
      const rect = getCanvasRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const target = findBubbleAtPoint(x, y);
      if (target) popBubble(target);
    }

    // 查找气泡位置
    function findBubbleAtPoint(x, y) {
      const candidates = getBubbleLayouts().reverse();
      return candidates.find((bubble) => {
        const dx = x - bubble.screenX;
        const dy = y - bubble.screenY;
        return Math.hypot(dx, dy) <= bubble.renderRadius;
      }) || null;
    }

    // 计算气泡布局 - 只有悬停的泡泡暂停漂移
    function getBubbleLayouts() {
      const rect = getCanvasRect();
      const width = rect.width || canvas.clientWidth || 400;
      const height = rect.height || canvas.clientHeight || 400;
      const now = performance.now();
      const elapsed = now - state.timeStart;

      return state.bubbles.map((bubble) => {
        // 只有当前悬停的泡泡暂停漂移，其他泡泡继续漂浮
        const isHovered = state.hoverId === bubble.id;
        const driftMultiplier = isHovered ? 0 : 1;
        
        // 缓慢漂浮动画
        const pulse = Math.sin(elapsed * 0.0015 + bubble.driftSeed * 10) * 4 * driftMultiplier;
        const driftX = Math.sin(elapsed * 0.0008 + bubble.driftSeed * 8) * 10 * driftMultiplier;
        const driftY = Math.cos(elapsed * 0.0012 + bubble.driftSeed * 7) * 8 * driftMultiplier;
        
        // 转换百分比位置到像素
        const centerX = width * (bubble.anchorX / 100);
        const centerY = height * (bubble.anchorY / 100);
        
        const screenX = centerX + bubble.baseOffsetX + driftX;
        const screenY = centerY + bubble.baseOffsetY + driftY - pulse;
        
        // 悬停时放大
        const hoverBoost = isHovered ? 1.2 : 1;
        const popProgress = bubble.popped ? clamp((now - bubble.popStart) / 300, 0, 1) : 0;
        const visibility = bubble.popped ? 1 - popProgress : 1;

        return {
          ...bubble,
          screenX,
          screenY,
          hoverBoost,
          isHovered,
          popProgress,
          visibility,
          renderRadius: bubble.radius * hoverBoost * Math.max(visibility, 0.01)
        };
      });
    }

    // 戳破气泡
    function popBubble(bubble) {
      if (bubble.popped) return;
      bubble.popped = true;
      bubble.popStart = performance.now();
      state.answer = bubble;
      updateAnswerPanel();
      updateFootState();
    }

    // 随机戳破
    function popRandomBubble() {
      if (!state.ready) return;
      const remaining = state.bubbles.filter((bubble) => !bubble.popped);
      if (!remaining.length) {
        updateFootState();
        return;
      }
      const picked = remaining[Math.floor(Math.random() * remaining.length)];
      popBubble(picked);
    }

    // 重置气泡
    function resetBubbles() {
      if (!state.ready) return;
      state.bubbles.forEach((bubble) => {
        bubble.popped = false;
        bubble.popStart = 0;
      });
      state.answer = null;
      updateAnswerPanel();
      updateFootState();
    }

    // 动画循环
    function drawLoop() {
      drawScene();
      requestAnimationFrame(drawLoop);
    }

    // 绘制场景
    function drawScene() {
      if (!canvas || !ctx) return;
      const width = state.cupRect ? state.cupRect.width : (canvas.clientWidth || 400);
      const height = state.cupRect ? state.cupRect.height : (canvas.clientHeight || 400);
      ctx.clearRect(0, 0, width, height);
      
      // 绘制杯子背景
      drawCup(width, height);
      
      // 绘制气泡
      if (state.ready) {
        getBubbleLayouts().forEach(drawBubble);
      }
    }

    // 绘制杯子
    function drawCup(width, height) {
      const cupX = width * 0.1;
      const cupY = height * 0.08;
      const cupWidth = width * 0.8;
      const cupHeight = height * 0.8;
      const rimHeight = Math.max(20, height * 0.05);

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cupX + 20, cupY);
      ctx.quadraticCurveTo(cupX + cupWidth / 2, cupY - rimHeight, cupX + cupWidth - 20, cupY);
      ctx.lineTo(cupX + cupWidth - 30, cupY + cupHeight - 20);
      ctx.quadraticCurveTo(cupX + cupWidth / 2, cupY + cupHeight + 20, cupX + 30, cupY + cupHeight - 20);
      ctx.closePath();

      // 杯子填充
      const fill = ctx.createLinearGradient(0, cupY, 0, cupY + cupHeight);
      fill.addColorStop(0, "rgba(255,255,255,0.4)");
      fill.addColorStop(0.2, "rgba(245, 250, 252, 0.45)");
      fill.addColorStop(1, "rgba(215, 228, 232, 0.55)");
      ctx.fillStyle = fill;
      ctx.fill();

      // 杯子边框
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "rgba(114, 110, 104, 0.3)";
      ctx.stroke();

      // 水面
      ctx.beginPath();
      ctx.ellipse(cupX + cupWidth / 2, cupY + 25, cupWidth / 2 - 20, rimHeight, 0, 0, Math.PI * 2);
      const water = ctx.createLinearGradient(0, cupY, 0, cupY + cupHeight);
      water.addColorStop(0, "rgba(245, 249, 250, 0.6)");
      water.addColorStop(1, "rgba(207, 221, 226, 0.65)");
      ctx.fillStyle = water;
      ctx.fill();

      ctx.restore();
    }

    // 绘制气泡
    function drawBubble(bubble) {
      if (bubble.visibility <= 0) return;

      const radius = bubble.renderRadius;
      const x = bubble.screenX;
      const y = bubble.screenY;
      const opacity = bubble.visibility;
      const isHovered = bubble.isHovered;

      ctx.save();
      ctx.globalAlpha = opacity;

      // 悬停时添加光圈高亮效果
      if (isHovered) {
        // 外层光圈
        ctx.beginPath();
        ctx.arc(x, y, radius + 8, 0, Math.PI * 2);
        const glowGradient = ctx.createRadialGradient(x, y, radius, x, y, radius + 12);
        glowGradient.addColorStop(0, hexToRgba(bubble.color, 0.4));
        glowGradient.addColorStop(1, hexToRgba(bubble.color, 0));
        ctx.fillStyle = glowGradient;
        ctx.fill();
        
        // 增强阴影
        ctx.shadowColor = hexToRgba(bubble.color, 0.5);
        ctx.shadowBlur = 25;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
      }

      // 气泡主体
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      
      // 渐变填充
      const gradient = ctx.createRadialGradient(
        x - radius * 0.3, y - radius * 0.4, radius * 0.1,
        x, y, radius
      );
      gradient.addColorStop(0, "rgba(255,255,255,0.7)");
      gradient.addColorStop(0.5, "rgba(255,255,255,0.25)");
      gradient.addColorStop(1, hexToRgba(bubble.color, isHovered ? 0.4 : 0.3));
      ctx.fillStyle = gradient;
      ctx.fill();

      // 边框 - 悬停时更明显
      ctx.shadowBlur = 0;
      ctx.lineWidth = isHovered ? 2.5 : 1.5;
      ctx.strokeStyle = isHovered ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.8)";
      ctx.stroke();

      // 高光
      ctx.beginPath();
      ctx.arc(x - radius * 0.25, y - radius * 0.35, radius * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = isHovered ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.4)";
      ctx.fill();

      // 破裂动画
      if (bubble.popProgress > 0 && bubble.popProgress < 1) {
        ctx.beginPath();
        ctx.arc(x, y, radius + bubble.popProgress * 25, 0, Math.PI * 2);
        ctx.lineWidth = 2;
        ctx.strokeStyle = hexToRgba(bubble.color, 0.35 * (1 - bubble.popProgress));
        ctx.stroke();
      }

      // 绘制问题文字
      drawBubbleText(bubble, radius);
      ctx.restore();
    }

    // 绘制气泡文字
    function drawBubbleText(bubble, radius) {
      const maxLen = Math.floor(radius / 4);
      const question = bubble.question.length > maxLen ? `${bubble.question.slice(0, maxLen)}…` : bubble.question;
      
      ctx.fillStyle = `rgba(45, 41, 38, ${0.65 * bubble.visibility})`;
      ctx.font = `${Math.max(11, Math.min(15, radius * 0.4))}px serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      
      // 文字换行
      const maxWidth = radius * 1.6;
      const lineHeight = Math.max(12, radius * 0.4);
      wrapCanvasText(question, bubble.screenX, bubble.screenY, maxWidth, lineHeight);
    }

    // 文字换行
    function wrapCanvasText(text, centerX, centerY, maxWidth, lineHeight) {
      const chars = Array.from(text);
      const lines = [];
      let current = "";

      chars.forEach((char) => {
        const testLine = current + char;
        if (ctx.measureText(testLine).width > maxWidth && current) {
          lines.push(current);
          current = char;
        } else {
          current = testLine;
        }
      });

      if (current) lines.push(current);

      const visibleLines = lines.slice(0, 3);
      const offset = ((visibleLines.length - 1) * lineHeight) / 2;
      visibleLines.forEach((line, index) => {
        ctx.fillText(line, centerX, centerY - offset + index * lineHeight);
      });
    }

    // 辅助函数
    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function hashString(input) {
      let hash = 0;
      for (let i = 0; i < input.length; i += 1) {
        hash = (hash << 5) - hash + input.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash % 997) / 997;
    }

    function hexToRgba(hex, alpha) {
      const normalized = hex.replace("#", "");
      const value = normalized.length === 3
        ? normalized.split("").map((char) => char + char).join("")
        : normalized;
      const int = parseInt(value, 16);
      const r = (int >> 16) & 255;
      const g = (int >> 8) & 255;
      const b = int & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
